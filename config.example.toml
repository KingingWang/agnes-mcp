# Agnes AI MCP Server Configuration
#
# Configuration priority (highest first):
#   1. Command-line arguments
#   2. Environment variables (AGNES_API_KEY / AGNES_TOKEN, AGNES_BASE_URL, AGNES_MCP_*)
#   3. This TOML file
#   4. Built-in defaults

# =============================================================================
# [agnes] Agnes API configuration
# =============================================================================
[agnes]
# Agnes API base URL (no trailing slash).
base_url = "https://apihub.agnes-ai.com"
# Agnes API key. Prefer the AGNES_API_KEY environment variable over committing
# the key here. A test key is provided for convenience.
api_key = "sk-YOUR_API_KEY_HERE"

# Multiple Agnes API keys, used as a round-robin pool: requests are distributed
# evenly across all keys. Useful when you have several free-tier keys to combine
# for higher throughput. Also settable via the AGNES_API_KEYS env var
# (comma-separated). When both api_key and api_keys are set, all keys are merged
# and deduped.
# api_keys = ["sk-KEY_1", "sk-KEY_2", "sk-KEY_3"]
# Request timeout for synchronous endpoints (chat, image), in seconds.
request_timeout_secs = 180
# Cooldown (seconds) applied to an API key after an authentication failure
# (HTTP 401/403). The key is skipped by the round-robin selector until the
# cooldown elapses. Defaults to 600 seconds (10 minutes).
# key_cooldown_secs = 600
# Cooldown (seconds) applied to an API key after a rate-limit response (HTTP 429).
# Defaults to 60 seconds.
# key_rate_limit_cooldown_secs = 60
# Optional directory for downloading generated assets.
# output_dir = "./outputs"

# Model identifiers. Defaults match Agnes free-tier models as of release.
# Override only if you use a custom gateway or a newer Agnes model.
# model_text  = "agnes-2.0-flash"
# model_image = "agnes-image-2.1-flash"
# model_video = "agnes-video-v2.0"

# MCP tools to disable. By default all built-in tools are enabled. Names must
# match the canonical tool identifiers exactly (case-sensitive); unknown names
# are ignored with a warning at startup. Available tool names:
#   - "agnes_image_recognition"
#   - "agnes_generate_image"
#   - "agnes_generate_video"
#   - "agnes_video_status"
# Also settable via the AGNES_DISABLED_TOOLS env var (comma-separated) or the
# repeatable --disable-tool CLI flag; entries from all sources are merged.
# disabled_tools = ["agnes_generate_video", "agnes_video_status"]

# =============================================================================
# [server] Server / transport configuration
# =============================================================================
[server]
# Server name reported to MCP clients.
name = "agnes-mcp"
# Bind host. Use 0.0.0.0 to expose externally (e.g. in Docker); 127.0.0.1 for local use.
host = "127.0.0.1"
# Bind port (http/sse/hybrid transports).
port = 8080
# Transport mode: stdio, http, sse, hybrid.
#   stdio  — for MCP client integration (Claude Desktop, Cursor, etc.)
#   http   — Streamable HTTP
#   sse    — Server-Sent Events
#   hybrid — HTTP + SSE
transport_mode = "stdio"

# =============================================================================
# [logging] Logging configuration
# =============================================================================
[logging]
# Log level: trace, debug, info, warn, error.
level = "info"
